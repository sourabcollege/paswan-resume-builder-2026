{% extends "base.html" %}
{% block title %}Search Candidates{% endblock %}
{% block content %}
<div class="container mt-4">
    <h1>Candidate Search</h1>
    <div class="card mb-4 mt-3">
        <div class="card-body">
            <form id="search-form" class="row g-3">
                <div class="col-md-4">
                    <label class="form-label">Skills (comma separated)</label>
                    <input type="text" name="skills" class="form-control" placeholder="e.g. Python, React">
                </div>
                <div class="col-md-2">
                    <label class="form-label">Min ATS Score</label>
                    <input type="number" name="min_ats" class="form-control" value="0" min="0" max="100">
                </div>
                <div class="col-md-2">
                    <label class="form-label">Max ATS Score</label>
                    <input type="number" name="max_ats" class="form-control" value="100" min="0" max="100">
                </div>
                <div class="col-md-3">
                    <label class="form-label">Experience</label>
                    <input type="text" name="experience" class="form-control" placeholder="e.g. 3+ years">
                </div>
                <div class="col-md-1 d-flex align-items-end">
                    <button type="submit" class="btn btn-primary w-100">Search</button>
                </div>
            </form>
        </div>
    </div>

    <div id="results-container">
        <!-- Search results will be injected here -->
    </div>
</div>

<script>
document.getElementById('search-form').addEventListener('submit', function(e) {
    e.preventDefault();
    const formData = new FormData(this);
    const params = new URLSearchParams(formData);

    fetch(`/recruiter/search?format=json&${params.toString()}`)
        .then(response => response.json())
        .then(data => {
            const container = document.getElementById('results-container');
            if (data.candidates.length === 0) {
                container.innerHTML = '<div class="alert alert-info">No candidates found matching your criteria.</div>';
                return;
            }

            let html = `<h3>Found ${data.total} Candidates</h3><div class="row mt-3">`;
            data.candidates.forEach(c => {
                html += `
                    <div class="col-md-6 mb-3">
                        <div class="card h-100">
                            <div class="card-body">
                                <h5 class="card-title">${c.name}</h5>
                                <p class="card-text">
                                    <strong>ATS Score:</strong> ${c.ats_score}%<br>
                                    <strong>Skill Match:</strong> ${c.skill_match}%<br>
                                    <strong>Skills:</strong> ${c.skills.join(', ')}
                                </p>
                                <a href="/recruiter/candidate/${c.user_id}" class="btn btn-outline-primary btn-sm">View Profile</a>
                                <button class="btn btn-success btn-sm shortlist-btn" data-id="${c.user_id}">Shortlist</button>
                            </div>
                        </div>
                    </div>
                `;
            });
            html += '</div>';
            container.innerHTML = html;
        });
});
</script>
{% endblock %}
